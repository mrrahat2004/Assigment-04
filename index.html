<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-04</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Aguafina+Script&family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="tailwind.css">

    <style>
        *{
            font-family: "Work Sans", sans-serif;
        }
    </style>

</head>
<body class="bg-[#F8F9FA] min-h-screen py-10 px-4">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-blue-700">
            Job Application Tracker
        </h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">

            <div class="bg-white py-6 px-6 rounded-xl border border-gray-100 shadow-sm ">
                <p class="text-2xl font-semibold text-black mb-1"> Total</p>
                <h2 id="total-dash" class="text-4xl font-black text-[#1E293B] ">
                    0
                </h2>
            </div>
            <div class="bg-white py-6 px-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-2xl font-semibold text-green-500 mb-1"> Interview</p>
                <h2 id="interview-dash" class="text-4xl font-black text-[#18ac49]">
                    0
                </h2>
            </div>
            <div class="bg-white py-6 px-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-2xl font-semibold text-red-700 mb-1"> Rejected</p>
                <h2 id="rejected-dash" class="text-4xl font-black text-[#c92323]">
                    0
                </h2>
            </div>

        </div>

        
            <br>
                <hr class="opacity-50">
            <br>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-4xl font-bold text-[#1E293B]">
                Available Jobs
            </h2>
            <p class="text-gray-400 font-medium"><span id="section-count">0</span>
                jobs
            </p>
        </div>

        <div class="flex gap-2 mb-8 bg-gray-200/50 p-1 w-fit rounded-lg">

            <button onclick="changeTab('all')" id="tab-all" class="px-6 py-2 rounded-md font-bold transition-all bg-blue-500 text-white">
                All
            </button>

            <button onclick="changeTab('interview')" id="tab-interview" class="px-6 py-2 rounded-md font-bold transition-all text-gray-500 hover:bg-white">
                Interview
            </button>

            <button onclick="changeTab('rejected')" id="tab-rejected" class="px-6 py-2 rounded-md font-bold transition-all text-gray-500 hover:bg-white">
                Rejected
            </button>

        </div>

        <div id="jobs-container" class="space-y-6">
        </div>

    </div>

    <script>

       let jobs = [

       {id: 1, company: "Mobile First corp", role: "React Native Developer", loc: "Remote • ", type: "Full-time • ", salary: "$130,000-$175,000", desc: "Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.", status: "all"
       },
       

       {id: 2, company: "WebFlow Agency", role: "Web Designer & Developer", loc: "Los Angeles, CA • ", type: "Part-time • ", salary: "$80,000-$120,000", desc: "Create stunning web experiences for high-profile clients. Must have portfolio and experience with modern web design trends.", status: "all" 
       },
       

       {id: 3, company: "DataViz Solutions", role: "Data Visualization Specialist", loc: "Boston, MA • ", type: "Full-time • ", salary: "$125,000 - $165,000", desc: "Transform complex data into compelling visualizations. Required skills: D3.js, React, and strong analytical thinking.", status: "all"
       },
       

       {id: 4, company: "CloudFirst Inc", role: "Backend Developer", loc: "Seattle, WA •", type: "Full-time • ", salary: "$140,000 - $190,000", desc: "Design and maintain scalable backend systems using Python and AWS. Work with modern DevOps practices and cloud infrastructure.", status: "all"
       },
       

       {id: 5, company: "Innovation Labs", role: "UI/UX Engineer", loc: "Austin, TX • ", type: "Full-time • ", salary: " $110,000 - $150,000", desc: "Create beautiful and functional user interfaces for our suite of products. Strong design skills and frontend development expertise required.", status: "all"
       },
       

       {id: 6, company: "MegaCorp Solutions", role: "JavaScript Developer", loc: "New York, NY • ", type: "Full-time • ", salary: "$130,000 - $170,000", desc: "Build enterprise applications with JavaScript and modern frameworks. We offer competitive compensation, health insurance, and professional development opportunities.", status: "all"
       },
       

       {id: 7, company: "StartupXYZ", role: "Full Stack Engineer", loc: "Remote • ", type: "Full-time • ", salary: "$120,000 - $160,000", desc: "Join our fast-growing startup and work on our core platform. Experience with Node.js and React required. Great benefits and equity package included.", status: "all"
       },
       

       {id: 8, company: "TechCorp Industries", role: "Senior Frontend Developer", loc: "San Francisco, CA •", type: "Full-time • ", salary: "$130,000-$175,000", desc: "We are looking for an experienced Frontend Developer to build scalable web applications using React and TypeScript. You will work with a talented team on cutting-edge projects.", status: "all"
       },   
     ];
     
     let activeTab = 'all';

     function render(){
        const container = document.getElementById('jobs-container');
        const filtered = jobs.filter( j => activeTab === 'all' ? true : j.status === activeTab);

        document.getElementById('total-dash').innerText = jobs.length;
        document.getElementById('interview-dash').innerText = jobs.filter(j => j.status === 'interview').length;
        document.getElementById('rejected-dash').innerText = jobs.filter(j => j.status === 'rejected').length;
        document.getElementById('section-count').innerText = filtered.length;

        container.innerHTML = '';

        if (filtered.length === 0) {
            container.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 bg-white rounded-xl border border-gray-100">
                <img src="jobs.png" class="w-20 mb-4 opacity-50" alt="No Jobs">
                <h3 class="text-xl font-bold text-gray-700">
                    No Jobs Available</h3>
                    <p class="text-gray-400">Current status: ${activeTab.toUpperCase()}</p>
            </div>`; 
            return;   
        }

        filtered.forEach(job => {
            const card = document.createElement('div');
            card.className = "bg-white p-8 rounded-xl border border-gray-100 shadow-sm relative group transition-all hover:shadow-md";
            card.innerHTML = `
            <button onclick="deleteJob(${job.id})" class="absolute top-6 right-8 p-2 rounded-lg bg-gray-50 text-gray-300 hover:text-red-500 hover:bg-red-50 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
            </button>
            <h3 class="text-3xl font-bold text-gray-900 mb-1">${job.company}</h3>
            <p class="text-[#2563EB] font-semibold mb-3 text-xl">${job.role}</p>
            <div class="flex flex-wrap gap-4 text-gray-400 mb-4 font-medium uppercase tracking-wider">
                <span>${job.loc}</span> • <span>${job.type}</span> • <span>${job.salary}</span>
            </div>
            <div class="mb-4">
                <span class="px-3 py-1 text-[20px] font-black rounded bg-blue-50 text-blue-600 border border-blue-100 uppercase tracking-tighter">
                    ${job.status === 'all' ? 'NOT APPLIED' : job.status}
                </span>
            </div>
            <p class="text-gray-500 text-[17px] mb-6 leading-relaxed max-w-2xl">${job.desc}</p>
            <div class="flex gap-4">
                <button onclick="updateStatus(${job.id}, 'interview')" class="px-6 py-2 rounded-lg border-2 font-black tracking-widest transition-all
                    ${job.status === 'interview' ? 'bg-[#10B981] border-[#10B981] text-white' : 'border-[#10B981] text-[#10B981] hover:bg-[#F0FDF4]'}">
                    INTERVIEW
                </button>
                <button onclick="updateStatus(${job.id}, 'rejected')" class="px-6 py-2 rounded-lg border-2 font-black tracking-widest transition-all
                    ${job.status === 'rejected' ? 'bg-[#EF4444] border-[#EF4444] text-white' : 'border-[#EF4444] text-[#EF4444] hover:bg-[#FEF2F2]'}">
                    REJECTED
                </button>
            </div>
        `;
        container.appendChild(card);

        });

     }

     function updateStatus(id, newStatus) {
        const job = jobs.find(j => j.id === id);
        job.status = (job.status === newStatus) ? 'all':
        newStatus;
        render();
     }

     function changeTab(tab){
        activeTab = tab ; 
        ['all', 'interview', 'rejected'].forEach(t => {
            const btn = document.getElementById(`tab-${t}`);
            if (t === tab) {
                btn.className = "px-6 py-2 rounded-md font-bold transition-all bg-[#2563EB] text-white";
            }
            else {
                btn.className = "px-6 py-2 rounded-md font-bold transition-all text-gray-500 hover:bg-white";
            }
        });
        render();
     }

     function deleteJob(id) {
        jobs = jobs.filter(j => j.id !== id);
        render();
     }

     render();
        

    </script>
    

</body>

</html>
