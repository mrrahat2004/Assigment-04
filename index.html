<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-04</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Aguafina+Script&family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="tailwind.css">

    <style>
        *{
            font-family: "Work Sans", sans-serif;
        }
    </style>

</head>
<body class="bg-[#F8F9FA] min-h-screen py-10 px-4">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-blue-700">
            Job Application Tracker
        </h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">

            <div class="bg-white py-6 px-6 rounded-xl border border-gray-100 shadow-sm ">
                <p class="text-2xl font-semibold text-black mb-1"> Total</p>
                <h2 id="total-dash" class="text-4xl font-black text-[#1E293B] ">
                    0
                </h2>
            </div>
            <div class="bg-white py-6 px-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-2xl font-semibold text-green-500 mb-1"> Interview</p>
                <h2 id="interview-dash" class="text-4xl font-black text-[#18ac49]">
                    0
                </h2>
            </div>
            <div class="bg-white py-6 px-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-2xl font-semibold text-red-700 mb-1"> Rejected</p>
                <h2 id="rejected-dash" class="text-4xl font-black text-[#c92323]">
                    0
                </h2>
            </div>

        </div>

        
            <br>
                <hr class="opacity-50">
            <br>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-4xl font-bold text-[#1E293B]">
                Available Jobs
            </h2>
            <p class="text-gray-400 font-medium"><span id="section-count">0</span>
                jobs
            </p>
        </div>

        <div class="flex gap-2 mb-8 bg-gray-200/50 p-1 w-fit rounded-lg">

            <button onclick="changeTab('all')" id="tab-all" class="px-6 py-2 rounded-md font-bold transition-all bg-blue-500 text-white">
                All
            </button>

            <button onclick="changeTab('interview')" id="tab-interview" class="px-6 py-2 rounded-md font-bold transition-all text-gray-500 hover:bg-white">
                Interview
            </button>

            <button onclick="changeTab('rejected')" id="tab-rejected" class="px-6 py-2 rounded-md font-bold transition-all text-gray-500 hover:bg-white">
                Rejected
            </button>

        </div>

        <div id="jobs-container" class="space-y-6">
        </div>

    </div>


    

</body>

</html>
